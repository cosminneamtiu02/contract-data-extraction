# Pin minimum pre-commit version to match `pre-commit>=4.0` in
# [dependency-groups.dev]. A developer running an older globally-
# installed pre-commit on a fresh machine (before `uv sync` puts the
# locked version on path) gets a clear version error instead of
# confusing hook-behavior differences.
minimum_pre_commit_version: "4.0"

repos:
  - repo: local
    hooks:
      - id: uv-lock-check
        name: uv lock --check (lockfile freshness)
        entry: uv lock --check
        language: system
        pass_filenames: false
        always_run: true
        # Mirrors ci.yml "Lockfile freshness check" step. A developer editing
        # pyproject.toml (e.g. bumping a dep floor) without re-running `uv lock`
        # would otherwise pass local hooks but fail in CI. Surfaced by Lens 18
        # (Pre-commit hooks & local DX) in the 2026-05-13 panel review.
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --check
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: mypy
        name: mypy
        entry: uv run mypy src tests
        language: system
        pass_filenames: false
        always_run: true
      - id: pip-audit
        name: pip-audit (CVE scan)
        entry: uv run pip-audit --skip-editable
        language: system
        # pip-audit inspects the whole resolved environment, not staged
        # filenames — pass_filenames disables the staged-file pipeline and
        # always_run forces a run even when no Python files changed (a CVE
        # advisory can land against a frozen lockfile).
        pass_filenames: false
        always_run: true

  # rev: v1.5.0 — pinned to match the `detect-secrets>=1.5` pip floor in
  # [dependency-groups.dev] and the `.secrets.baseline` format version;
  # Dependabot pre-commit ecosystem auto-updates patch/minor.
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        # Mirror the CI step (.github/workflows/ci.yml: secret scan) which
        # excludes the baseline file before piping to detect-secrets-hook.
        # The exclude is load-bearing, not redundant: the baseline file itself
        # stores hashed-secret records, so re-scanning it as input would
        # re-evaluate those stored hashes and produce noisy false positives or
        # confuse the delta comparison. Keeps pre-commit and CI symmetric.
        exclude: '^\.secrets\.baseline$'

  # rev: v6.0.0 — current stable; Dependabot pre-commit ecosystem
  # auto-updates patch/minor (major bumps gated per update-types filter).
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key
