# Dependabot configuration for the contract-data-extraction project.
#
# Scope: pip (single workspace at /), github-actions, pre-commit.
# Groups batch interlocking package updates into atomic PRs:
#   - fastapi-stack: fastapi + uvicorn (declared deps). `starlette` matches the
#     pattern but is a fastapi transitive — Dependabot won't open updates for it
#     directly. `uvicorn[standard]` transitives (httptools, uvloop, watchfiles)
#     are NOT declared deps either; they're pulled by the `standard` extra.
#   - pydantic:      pydantic + pydantic-settings (lockstep releases)
#   - pytest:        pytest + plugins (aligned releases)
#   - dev-tools:     ruff + mypy + pip-audit + detect-secrets + types-* + hatchling
#   - runtime-singletons: structlog + httpx + ollama + jsonschema + pyyaml
#   - ml-stack:      docling + rapidocr-onnxruntime + modelscope (heavy transitive trees)
#
# `update-types: [patch, minor]` on every pip group: a green-CI MAJOR bump
# would otherwise be eligible for the auto-merge workflow without human
# review. Major bumps now arrive as a separate, ungrouped PR per package
# that requires explicit review (Dependabot opens them outside the
# `update-types` filter set).

version: 2
updates:
  - package-ecosystem: pip
    directory: /
    target-branch: main
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    rebase-strategy: auto
    commit-message:
      prefix: "chore(deps)"
      include: scope
    labels:
      - dependencies
    groups:
      fastapi-stack:
        update-types: ["patch", "minor"]
        patterns:
          - "fastapi"
          - "starlette"
          - "uvicorn*"
          - "httptools"
          - "uvloop"
          - "watchfiles"
      pydantic:
        update-types: ["patch", "minor"]
        patterns:
          - "pydantic"
          - "pydantic-settings"
      pytest:
        update-types: ["patch", "minor"]
        patterns:
          - "pytest"
          - "pytest-*"
          - "hypothesis"
      dev-tools:
        update-types: ["patch", "minor"]
        patterns:
          - "ruff"
          - "mypy"
          - "pip-audit"
          - "detect-secrets"
          - "types-*"
          - "hatchling"
      runtime-singletons:
        update-types: ["patch", "minor"]
        patterns:
          - "structlog"
          - "httpx"
          - "ollama"
          - "jsonschema"
          - "pyyaml"
      ml-stack:
        update-types: ["patch", "minor"]
        patterns:
          - "docling"
          - "rapidocr-onnxruntime"
          - "modelscope"

  - package-ecosystem: github-actions
    directory: /
    target-branch: main
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    rebase-strategy: auto
    commit-message:
      prefix: "chore(deps)"
      include: scope
    labels:
      - dependencies
    groups:
      github-actions-stack:
        update-types: ["patch", "minor"]
        patterns:
          - "actions/*"
          - "astral-sh/*"
          - "github/codeql-action/*"

  - package-ecosystem: pre-commit
    directory: /
    target-branch: main
    schedule:
      interval: daily
    open-pull-requests-limit: 1
    rebase-strategy: auto
    commit-message:
      prefix: "chore(deps)"
      include: scope
    labels:
      - dependencies
    groups:
      pre-commit-tools:
        update-types: ["patch", "minor"]
        patterns:
          - "*"
