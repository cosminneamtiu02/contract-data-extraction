name: CodeQL

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly Monday 06:00 UTC — catches newly-published query rules even
    # when no PRs land that week.
    - cron: '0 6 * * 1'
  # Manual escape hatch for on-demand re-scans (e.g., after a CodeQL query
  # database refresh, after a forced push that cleared a stale SARIF, or
  # when the weekly schedule is insufficient). Mirrors the ci.yml trigger
  # pattern.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Distinct suffix per event_name so a Monday 06:00 UTC scheduled scan and a
  # concurrent PR scan don't collapse into the same group and cancel each
  # other (the short-circuit `github.event_name == 'push' && github.sha || 'pr'`
  # otherwise routes `schedule` into the `pr` bucket).
  # GitHub Actions expression semantics: `&&` and `||` return the last
  # truthy/falsy operand (truthy-wins short-circuit), so the chained ternary
  # `(push && sha) || (schedule && 'scheduled') || 'pr'` evaluates as:
  #   push      → sha                (non-empty, truthy)
  #   schedule  → 'scheduled'
  #   pr / workflow_dispatch / else → 'pr'
  # Do not refactor without preserving this semantics.
  group: codeql-${{ github.ref }}-${{ github.event_name == 'push' && github.sha || github.event_name == 'schedule' && 'scheduled' || 'pr' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    # WARNING: this `name:` materialises to status-check contexts
    # `Analyze (python)` and `Analyze (actions)` via the matrix expansion.
    # Both names are part of the branch-protection ruleset's required-status-
    # check contract (see CLAUDE.md project-state-notes for the authoritative
    # list). Do NOT rename without updating the ruleset in lock-step or
    # `gh pr merge --auto` will hang on "Expected — waiting for status."
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      # Required for SARIF upload to the Security tab.
      security-events: write
      # CodeQL reads workflow run metadata.
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [python, actions]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e  # v4.35.4
        with:
          languages: ${{ matrix.language }}
          build-mode: none  # Explicit none for both python (default-aligned, default-shift-proofed) and actions (only legal value)
          # Default query suite ("security"). No paths-ignore on day one;
          # revisit if signal-to-noise becomes problematic.

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e  # v4.35.4
        with:
          category: "/language:${{ matrix.language }}"
